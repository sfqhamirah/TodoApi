<!DOCTYPE html>
<html>
<head>
    <title>My Todo App</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f5f5f5;
        }

        h1 {
            color: #2E75B5;
            text-align: center;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 5px;
        }

        input {
            padding: 8px;
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

            input:focus {
                outline: none;
                border-color: #2E75B6;
                box-shadow: 0 0 0 2px rgba(46, 117, 182, 0.2);
            }

        button {
            padding: 8px 16px;
            background-color: #2E75B6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

            button:hover {
                background-color: #1F5C9E;
            }

            button:active {
                transform: scale(0.96);
            }

            button:disabled {
                background-color: #aac4dd;
                cursor: not-allowed;
            }

        .filters {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 16px 0 4px;
        }

        .filter-btn {
            background: none;
            color: #555;
            border: 1px solid #ccc;
            padding: 4px 12px;
            font-size: 13px;
        }

            .filter-btn:hover {
                background-color: #e9e9e9;
            }

            .filter-btn.active {
                background-color: #2E75B6;
                color: white;
                border-color: #2E75B6;
            }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #888;
            margin-top: 14px;
        }

        #errorBox {
            background: #fdecea;
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 13px;
            display: none;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }

        li {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            animation: slideIn 0.2s ease;
        }

            li.removing {
                animation: slideOut 0.2s ease forwards;
            }

            li.pending {
                opacity: 0.55;
            }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(20px);
                max-height: 0;
                padding: 0;
                margin: 0;
            }
        }

        li span {
            flex: 1;
            cursor: text;
            padding: 2px 4px;
            border-radius: 3px;
        }

            li span:hover {
                background: #f0f4f8;
            }

        li input.edit-input {
            flex: 1;
            margin-right: 8px;
        }

        li button {
            margin-left: 8px;
            padding: 6px 12px;
            font-size: 13px;
        }

            li button.delete-btn {
                background-color: #d9534f;
            }

                li button.delete-btn:hover {
                    background-color: #c9302c;
                }

        .completed {
            text-decoration: line-through;
            color: #999;
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            padding: 30px 0;
            font-size: 14px;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #ccc;
            border-top-color: #2E75B6;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <h1>My Todo List</h1>
    <div class="subtitle" id="subtitle">&nbsp;</div>

    <div class="input-row">
        <input id="taskInput" type="text" placeholder="Enter task name..." maxlength="200">
        <button id="addBtn" onclick="addTask()">Add Task</button>
    </div>

    <div id="errorBox"></div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <div class="status-row">
        <span id="taskCounter"></span>
        <span id="loadingIndicator" style="display:none;"><span class="spinner"></span> syncing...</span>
    </div>

    <script>
        const API = "http://localhost:5219/todos";
        let tasks = [];
        let currentFilter = "all";

        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const errorBox = document.getElementById("errorBox");
        const loadingIndicator = document.getElementById("loadingIndicator");

        // Enter key adds a task
        taskInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addTask();
        });

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = "block";
            clearTimeout(showError._t);
            showError._t = setTimeout(() => { errorBox.style.display = "none"; }, 4000);
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll(".filter-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.filter === filter);
            });
            render();
        }

        function loadTasks() {
            loadingIndicator.style.display = "inline-block";
            fetch(API)
                .then(response => {
                    if (!response.ok) throw new Error("Server responded with an error");
                    return response.json();
                })
                .then(data => {
                    tasks = data;
                    render();
                })
                .catch(() => {
                    showError("Couldn't reach the server. Is the backend running on port 5219?");
                })
                .finally(() => {
                    loadingIndicator.style.display = "none";
                });
        }

        function render() {
            const list = document.getElementById("taskList");
            list.innerHTML = "";

            const visibleTasks = tasks.filter(t => {
                if (currentFilter === "active") return !t.isComplete;
                if (currentFilter === "completed") return t.isComplete;
                return true;
            });

            if (visibleTasks.length === 0) {
                const emptyMsg = tasks.length === 0
                    ? "No tasks yet — add one above to get started."
                    : "Nothing to show for this filter.";
                list.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
            }

            visibleTasks.forEach(task => {
                const li = document.createElement("li");
                li.dataset.id = task.id;
                if (task._pending) li.classList.add("pending");

                const span = document.createElement("span");
                span.textContent = task.name;
                span.className = task.isComplete ? "completed" : "";
                span.title = "Double-click to edit";
                span.ondblclick = () => startEdit(task, li, span);

                const completeBtn = document.createElement("button");
                completeBtn.textContent = task.isComplete ? "↺ Undo" : "✓ Complete";
                completeBtn.onclick = () => completeTask(task);

                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "Delete";
                deleteBtn.className = "delete-btn";
                deleteBtn.onclick = () => deleteTask(task, li);

                li.appendChild(span);
                li.appendChild(completeBtn);
                li.appendChild(deleteBtn);
                list.appendChild(li);
            });

            const remaining = tasks.filter(t => !t.isComplete).length;
            document.getElementById("taskCounter").textContent =
                tasks.length === 0 ? "" : `${remaining} task${remaining !== 1 ? "s" : ""} left`;
            document.getElementById("subtitle").textContent =
                tasks.length === 0 ? "\u00A0" : `${tasks.length} total`;
        }

        function startEdit(task, li, span) {
            const input = document.createElement("input");
            input.type = "text";
            input.value = task.name;
            input.className = "edit-input";
            li.replaceChild(input, span);
            input.focus();
            input.select();

            const finish = (save) => {
                const newName = input.value.trim();
                if (save && newName && newName !== task.name) {
                    updateTaskName(task, newName);
                } else {
                    render();
                }
            };

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter") finish(true);
                if (e.key === "Escape") finish(false);
            });
            input.addEventListener("blur", () => finish(true));
        }

        function addTask() {
            const taskName = taskInput.value.trim();
            if (taskName === "") {
                showError("Please enter a task name.");
                return;
            }

            addBtn.disabled = true;

            // Optimistic UI: show immediately with a temp id
            const tempId = "temp-" + Date.now();
            const optimisticTask = { id: tempId, name: taskName, isComplete: false, _pending: true };
            tasks.push(optimisticTask);
            render();
            taskInput.value = "";

            fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: taskName, isComplete: false })
            })
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.json();
                })
                .then(saved => {
                    const idx = tasks.findIndex(t => t.id === tempId);
                    if (idx !== -1) tasks[idx] = saved;
                    render();
                })
                .catch(() => {
                    tasks = tasks.filter(t => t.id !== tempId);
                    render();
                    showError("Failed to add task. Please try again.");
                })
                .finally(() => {
                    addBtn.disabled = false;
                });
        }

        function completeTask(task) {
            const previous = task.isComplete;
            task.isComplete = !task.isComplete; // optimistic
            render();

            fetch(`${API}/${task.id}`, { method: "PUT" })
                .catch(() => {
                    task.isComplete = previous;
                    render();
                    showError("Failed to update task.");
                });
        }

        function updateTaskName(task, newName) {
            const previous = task.name;
            task.name = newName; // optimistic
            render();

            fetch(`${API}/${task.id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: newName, isComplete: task.isComplete })
            }).catch(() => {
                task.name = previous;
                render();
                showError("Failed to rename task.");
            });
        }

        function deleteTask(task, li) {
            li.classList.add("removing");
            setTimeout(() => {
                fetch(`${API}/${task.id}`, { method: "DELETE" })
                    .then(() => {
                        tasks = tasks.filter(t => t.id !== task.id);
                        render();
                    })
                    .catch(() => {
                        render(); // undo the visual removal
                        showError("Failed to delete task.");
                    });
            }, 180);
        }

        loadTasks();
    </script>

</body>
</html>
